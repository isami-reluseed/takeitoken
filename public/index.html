<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAKEI TOKEN POC</title>
    <link rel="stylesheet" href="/styles.css?v=20260308a" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script type="module" src="/app.js?v=20260308a" defer></script>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <p class="badge">Kairos Testnet POC</p>
        <h1>TAKEI TOKEN &#x914D;&#x5E03;</h1>
      </header>

      <section id="status-message" class="message" hidden></section>

      <section id="claim-view" class="card" hidden>
        <img id="claim-nft-image" class="nft-image" src="" alt="NFT image" />
        <h2 id="claim-nft-name">NFT</h2>
        <p id="claim-nft-description" class="description"></p>
        <p id="claim-summary" class="summary">NFT 1&#x679A; + 10,000 TAKEI TOKEN &#x3092;&#x53D7;&#x3051;&#x53D6;&#x308C;&#x307E;&#x3059;</p>

        <div class="coin-block">
          <img id="claim-coin-image" class="coin-image" src="/assets/TAKEI_COIN.png" alt="TAKEI COIN" />
          <p class="coin-text">10,000 TAKEI TOKEN</p>
        </div>

        <button id="claim-button" class="primary claim-main-button">&#x53D7;&#x3051;&#x53D6;&#x308B;</button>
      </section>

      <section id="complete-view" class="card" hidden>
        <h2>&#x53D6;&#x5F97;&#x304C;&#x5B8C;&#x4E86;&#x3057;&#x307E;&#x3057;&#x305F;</h2>
        <img id="complete-nft-image" class="nft-image" src="" alt="NFT image" />

        <div class="coin-block">
          <img id="complete-coin-image" class="coin-image" src="/assets/TAKEI_COIN.png" alt="TAKEI COIN" />
          <p id="complete-coin-text" class="coin-text">10,000 TAKEI TOKEN &#x53D7;&#x3051;&#x53D6;&#x308A;&#x6E08;&#x307F;</p>
        </div>

        <section class="blockchain-section">
          <h3>&#x30D6;&#x30ED;&#x30C3;&#x30AF;&#x30C1;&#x30A7;&#x30FC;&#x30F3;&#x60C5;&#x5831;</h3>
          <div class="blockchain-row">
            <p class="blockchain-label">Taken ID</p>
            <p id="complete-taken-id" class="blockchain-value">-</p>
          </div>
        </section>

        <div class="actions">
          <button id="to-mypage-button" class="primary">&#x30DE;&#x30A4;&#x30DA;&#x30FC;&#x30B8;&#x3092;&#x898B;&#x308B;</button>
          <button id="back-line-button" class="secondary">LINE&#x306B;&#x623B;&#x308B;</button>
        </div>
      </section>

      <section id="mypage-view" class="card" hidden>
        <h2>&#x30DE;&#x30A4;&#x30DA;&#x30FC;&#x30B8;</h2>
        <dl class="info-list">
          <div>
            <dt>LINE&#x8868;&#x793A;&#x540D;</dt>
            <dd id="mypage-display-name">-</dd>
          </div>
          <div>
            <dt>&#x72B6;&#x614B;</dt>
            <dd id="mypage-status">-</dd>
          </div>
          <div>
            <dt>&#x30B3;&#x30A4;&#x30F3;&#x6B8B;&#x9AD8;</dt>
            <dd id="mypage-coin-balance">0</dd>
          </div>
          <div>
            <dt>&#x53D7;&#x3051;&#x53D6;&#x308A;&#x65E5;&#x6642;</dt>
            <dd id="mypage-claimed-at">-</dd>
          </div>
        </dl>

        <img id="mypage-nft-image" class="nft-image" src="" alt="NFT image" />
        <p id="mypage-nft-name" class="nft-name"></p>

        <section class="blockchain-section">
          <h3>&#x30D6;&#x30ED;&#x30C3;&#x30AF;&#x30C1;&#x30A7;&#x30FC;&#x30F3;&#x60C5;&#x5831;</h3>
          <div class="blockchain-row">
            <p class="blockchain-label">Taken ID</p>
            <p id="mypage-taken-id" class="blockchain-value">-</p>
          </div>
        </section>
      </section>
    </main>

    <div id="processing-modal" class="modal" hidden>
      <div class="modal-card">
        <p class="loading">&#x4ED8;&#x4E0E;&#x51E6;&#x7406;&#x4E2D;&#x3067;&#x3059;...</p>
        <p>&#x53CD;&#x6620;&#x307E;&#x3067;&#x5C11;&#x3057;&#x6642;&#x9593;&#x304C;&#x304B;&#x304B;&#x308B;&#x5834;&#x5408;&#x304C;&#x3042;&#x308A;&#x307E;&#x3059;&#x3002;</p>
      </div>
    </div>
  </body>
</html>
